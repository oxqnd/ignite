name: PyTorch version tests

on:
  # https://docs.github.com/en/free-pro-team@latest/actions/reference/workflow-syntax-for-github-actions#onschedule
  schedule:
    # Run at 00:00 UTC Every Day
    - cron: "0 0 * * *"
  workflow_dispatch:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 85
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        python-version: [3.9, "3.10", "3.11"]
        pytorch-version: [2.5.1, 2.4.1, 2.3.1, 2.2.2, 1.13.1, 1.12.1, 1.10.0]
        exclude:
          - pytorch-version: 1.10.0
            python-version: "3.10"
          - pytorch-version: 1.10.0
            python-version: "3.11"

          - pytorch-version: 1.11.0
            python-version: "3.10"
          - pytorch-version: 1.11.0
            python-version: "3.11"
          - pytorch-version: 1.12.1
            python-version: "3.11"
          # Conda fails to install cpuonly version and few cpu distributed tests are
          # failing with unrelated errors
          - pytorch-version: 1.13.1
            python-version: "3.11"

    steps:
      - uses: actions/checkout@v4

      - name: Get year & week number
        id: get-date
        run: echo "date=$(/bin/date "+%Y-%U")" >> $GITHUB_OUTPUT

      - name: Setup UV
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: "${{ steps.get-date.outputs.date }}-pytorch-${{ runner.os }}-${{ matrix.python-version }}-${{ matrix.pytorch-version }}"

      - name: Install dependencies
        run: |
          uv pip install torch==${{ matrix.pytorch-version }} torchvision --index-url https://download.pytorch.org/whl/cpu

          python -c "import torch; exit(not float('.'.join(torch.__version__.split('.')[:2])) < 2.3)"
          if [ $? -eq 0 ]; then
            uv pip install "numpy<2.0"
          fi

          uv pip install -r requirements-dev.txt
          uv pip install .

          if [[ "${{ matrix.pytorch-version }}" == "1.9."* || "${{ matrix.pytorch-version }}" == "1.10."* ]]; then
            uv pip install "setuptools<59"
          fi

      - name: Download MNIST
        uses: pytorch-ignite/download-mnist-github-action@master
        with:
          target_dir: /tmp

      - name: Run Tests
        uses: nick-fields/retry@v3.0.2
        with:
          max_attempts: 5
          timeout_minutes: 15
          shell: bash
          command: bash tests/run_cpu_tests.sh "not test_time_profilers"
          new_command_on_retry: USE_LAST_FAILED=1 bash -l tests/run_cpu_tests.sh "not test_time_profilers"

  create-issue:
    runs-on: ubuntu-latest
    # https://docs.github.com/en/actions/reference/context-and-expression-syntax-for-github-actions#needs-context
    needs: build
    if: always() && needs.build.result == 'failure'
    steps:
      - uses: actions/checkout@v4
      - uses: JasonEtco/create-an-issue@v2
        name: Create issue if pytorch version tests failed
        with:
          filename: .github/failed_schedule_issue_template.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
